name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    name: Backend tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          OPENAI_API_KEY: test-key
          SECRET_KEY: test-secret-key-for-ci-only-do-not-use-in-prod
          DATABASE_URL: sqlite:///./test.db
        run: |
          pytest --cov=app --cov-config=.coveragerc --cov-report=term --cov-report=xml --cov-fail-under=95

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
        if: always()

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ai-qa-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: ai-qa-frontend:ci

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, docker-build]
    # Only deploy on push to main, never on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render backend deploy
        env:
          HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::RENDER_BACKEND_DEPLOY_HOOK secret not set; skipping backend deploy."
            exit 0
          fi
          echo "Triggering Render backend deploy..."
          curl -fsSL -X POST "$HOOK" || { echo "::error::Backend deploy hook failed"; exit 1; }
          echo "Backend deploy triggered."

      - name: Trigger Render frontend deploy
        env:
          HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::RENDER_FRONTEND_DEPLOY_HOOK secret not set; skipping frontend deploy."
            exit 0
          fi
          echo "Triggering Render frontend deploy..."
          curl -fsSL -X POST "$HOOK" || { echo "::error::Frontend deploy hook failed"; exit 1; }
          echo "Frontend deploy triggered."

      - name: Summary
        run: |
          echo "## 🚀 Deploy triggered" >> $GITHUB_STEP_SUMMARY
          echo "Render is now building & deploying. Check the Render dashboard for progress." >> $GITHUB_STEP_SUMMARY
