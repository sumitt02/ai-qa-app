# Render Blueprint — provisions all services for one-click deploy.
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub.
#   2. In Render: New → Blueprint → connect your repo → Apply.
#   3. Render reads this file and creates everything below.
#   4. Set OPENAI_API_KEY in the backend service's env vars (it's marked sync:false).

databases:
  - name: aiqa-db
    plan: free
    databaseName: aiqa
    user: aiqa
    postgresMajorVersion: 16

services:
  # Backend API — Docker service
  - type: web
    name: aiqa-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: false  # CI controls deploys via deploy hook
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aiqa-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true  # Render generates a secure value
      - key: OPENAI_API_KEY
        sync: false          # You set this manually in the dashboard
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: whisper-1
      - key: UPLOAD_DIR
        value: /app/storage/uploads
      - key: CHROMA_DIR
        value: /app/storage/chroma
      - key: CORS_ORIGINS
        # Set this to your frontend URL once it's live (e.g. https://aiqa-frontend.onrender.com)
        sync: false
      - key: MAX_UPLOAD_SIZE_MB
        value: "100"

  # Frontend — static site, built from Vite
  - type: web
    name: aiqa-frontend
    runtime: static
    plan: free
    autoDeploy: false
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        # Set this to your backend URL once it's live (e.g. https://aiqa-backend.onrender.com)
        sync: false
    routes:
      # SPA fallback so React Router routes don't 404
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
